edition = "2023";

import "buf/validate/validate.proto";

package example;

message AnExampleMessage {
    option (buf.validate.message).cel = {
        id: "some_integer_greater_than_another_integer"
        message: "some integer must be greater than another integer if present"
        expression: "int (this.some_integer) > this.another_integer || !has (this.another_integer)"
    };

    uint32 some_integer = 1 [(buf.validate.field).uint32 = {gte : 0, lte : 88 }];
    sint32 another_integer = 2;
    string some_string = 8 [(buf.validate.field).required = true];
    repeated string some_more_strings = 11 [(buf.validate.field).repeated.unique = true];
}
